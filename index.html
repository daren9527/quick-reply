<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NID 快速回覆工具</title>
<style>
#app *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
#app{background:#111;min-height:100vh;color:#eee;padding-bottom:30px;}
#app .tab-bar{display:flex;background:#1a1a1a;border-bottom:2px solid #2a2a2a;position:sticky;top:0;z-index:100;}
#app .tab-btn{flex:1;padding:14px 8px;background:none;border:none;border-bottom:3px solid transparent;color:#666;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:-2px;transition:all 0.2s;}
#app .tab-btn.active{color:#FFD600;border-bottom-color:#FFD600;}
#app .page{display:none;padding:14px;}
#app .page.active{display:block;}
#app h2{font-size:16px;font-weight:700;color:#FFD600;margin-bottom:3px;}
#app .sub{font-size:12px;color:#888;margin-bottom:14px;}
#app .card{background:#1e1e1e;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #2a2a2a;}
#app .card-label{font-size:10px;font-weight:700;color:#FFD600;text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:9px;}
#app .g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
#app .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
#app .gbtn{padding:11px 4px;border:1.5px solid #333;border-radius:9px;background:#2a2a2a;font-size:12px;font-weight:700;color:#ccc;cursor:pointer;transition:all .15s;text-align:center;}
#app .gbtn.active{background:#FFD600;border-color:#FFD600;color:#111;}
#app .class-list{display:flex;flex-direction:column;gap:7px;max-height:220px;overflow-y:auto;}
#app .cbtn{padding:10px 12px;border:1.5px solid #333;border-radius:9px;background:#2a2a2a;font-size:13px;color:#ddd;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:all .15s;}
#app .cbtn.active{background:#2a2200;border-color:#FFD600;color:#FFD600;font-weight:600;}
#app .cbtn .fh{font-size:11px;color:#666;}
#app .cbtn.active .fh{color:#ccaa00;}
#app .lessons-row{display:flex;align-items:center;justify-content:center;background:#2a2a2a;border-radius:11px;border:1.5px solid #333;overflow:hidden;}
#app .sbtn{width:50px;height:52px;background:none;border:none;color:#FFD600;font-size:26px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#app .sbtn:active{background:#2a2200;}
#app .lnum{flex:1;text-align:center;font-size:28px;font-weight:800;color:#FFD600;line-height:52px;}
#app .lunit{font-size:13px;color:#888;padding-right:12px;}
#app .fee-box{background:#2a2200;border-radius:9px;padding:11px 14px;margin-top:9px;display:flex;justify-content:space-between;align-items:center;border:1px solid #FFD600;}
#app .fee-box .fl{font-size:12px;color:#888;}
#app .fee-box .fa{font-size:20px;font-weight:800;color:#FFD600;}
#app .result-box{background:#1a1800;border:1.5px solid #FFD600;border-radius:11px;padding:13px;font-size:13px;line-height:1.75;color:#eee;white-space:pre-wrap;word-break:break-all;margin-bottom:9px;min-height:90px;}
#app .copy-btn{width:100%;padding:13px;background:#FFD600;color:#111;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;}
#app .copy-btn.copied{background:#22c55e;color:#fff;}
#app input,#app select{width:100%;padding:10px 12px;border:1.5px solid #333;border-radius:9px;font-size:13px;color:#fff;background:#2a2a2a;outline:none;margin-bottom:7px;}
#app input:focus,#app select:focus{border-color:#FFD600;}
#app select option{background:#2a2a2a;}
#app .stitle{font-size:10px;font-weight:700;color:#FFD600;text-transform:uppercase;letter-spacing:.07em;margin:10px 0 7px;}
#app .p2list{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;}
#app .p2btn{padding:9px 11px;border:1.5px solid #333;border-radius:9px;background:#2a2a2a;font-size:12px;color:#ddd;cursor:pointer;text-align:left;transition:all .15s;}
#app .p2btn.active{background:#2a2200;border-color:#FFD600;color:#FFD600;font-weight:600;}
#app .date-grid{display:flex;flex-wrap:wrap;gap:6px;max-height:150px;overflow-y:auto;}
#app .dbtn{padding:7px 10px;border:1.5px solid #333;border-radius:8px;background:#2a2a2a;font-size:12px;font-weight:600;color:#ccc;cursor:pointer;transition:all .15s;}
#app .dbtn.active{background:#FFD600;border-color:#FFD600;color:#111;}
#app .info-box{background:#2a2200;border:1px solid #555;border-radius:9px;padding:10px 12px;margin-bottom:7px;font-size:12px;color:#ccc;line-height:1.6;}
#app .info-box span{color:#FFD600;font-weight:700;}
#app .hidden{display:none!important;}
#app .empty{color:#555;font-size:12px;text-align:center;padding:14px 0;}
#app .irow{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
#app .irow input,#app .irow select{margin-bottom:0;}
</style>
</head>
<body><div id="app">
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('p1',this)">📋 費用回覆</button>
  <button class="tab-btn" onclick="switchTab('p2',this)">✅ 確認報名</button>
</div>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h2>🏃 費用快速回覆</h2>
  <p class="sub">選類別 → 星期 → 班級 → 複製</p>
  <div class="card">
    <span class="card-label">選擇類別</span>
    <div class="g2">
      <button class="gbtn" onclick="selectCat('taipei',this)">🏙️ 台北跑步班</button>
      <button class="gbtn" onclick="selectCat('kaohsiung',this)">🌆 高雄跑步班</button>
      <button class="gbtn" onclick="selectCat('nurture',this)">🏃 跑者養成班</button>
      <button class="gbtn" onclick="selectCat('strength',this)">💪 肌力班</button>
    </div>
  </div>
  <div class="card" id="day-card">
    <span class="card-label">選擇星期</span>
    <div class="g4" id="day-grid"></div>
  </div>
  <div class="card">
    <span class="card-label" id="class-label">選擇班級</span>
    <div class="class-list" id="class-list"><p class="empty">請先選擇類別</p></div>
  </div>
  <div class="card">
    <span class="card-label">報名類型</span>
    <div class="g2">
      <button class="gbtn" id="btn-full" onclick="selectType('full')">全額報名</button>
      <button class="gbtn" id="btn-insert" onclick="selectType('insert')">插班</button>
    </div>
  </div>
  <div class="card hidden" id="lessons-card">
    <span class="card-label">剩餘堂數</span>
    <div class="lessons-row">
      <button class="sbtn" onclick="step(-1)">−</button>
      <div class="lnum" id="lnum">1</div>
      <span class="lunit">堂</span>
      <button class="sbtn" onclick="step(1)">＋</button>
    </div>
    <div class="fee-box hidden" id="fee-box">
      <span class="fl">插班費用</span>
      <span class="fa" id="fee-amt">$0</span>
    </div>
  </div>
  <div class="card">
    <span class="card-label">回覆內容</span>
    <div class="result-box" id="result-box"><span style="color:#444">選完班級與類型後自動產生</span></div>
    <button class="copy-btn" id="copy-btn" onclick="doCopy('result-box','copy-btn')">複製回覆內容</button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <h2>✅ 確認報名成功</h2>
  <p class="sub">選類型後填資訊，一鍵複製</p>
  <div class="card">
    <span class="card-label">確認類型</span>
    <div class="g2">
      <button class="gbtn" onclick="selConfirm('full',this)">💰 全額繳費</button>
      <button class="gbtn" onclick="selConfirm('insert',this)">🔄 插班報名</button>
      <button class="gbtn" onclick="selConfirm('trial',this)" style="grid-column:span 2">🎉 體驗課程報名</button>

  </div>

  <!-- 全額 -->

      <div class="g4" id="full-day-grid"></div>
    </div>
    <div class="hidden" id="full-class-wrap" style="margin-top:10px">
      <div class="stitle" id="full-class-title">選擇班級</div>
      <div class="p2list" id="full-class-list"></div>
    </div>
    <div id="full-class-info" class="hidden" style="margin-top:10px">
      <div class="info-box" id="full-info-box"></div>
    </div>
  </div>

  <!-- 插班 -->
  <div class="card hidden" id="c-insert-card">
    <span class="card-label">插班資訊</span>
    <div class="stitle">選擇類別</div>
    <div class="g2" id="insert-cat-grid">

      <button class="gbtn" onclick="p2SelCat('insert','kaohsiung',this)">🌆 高雄跑步班</button>
      <button class="gbtn" onclick="p2SelCat('insert','nurture',this)">🏃 跑者養成班</button>
      <button class="gbtn" onclick="p2SelCat('insert','strength',this)">💪 肌力班</button>
    </div>
    <div class="hidden" id="insert-day-wrap" style="margin-top:10px">
      <div class="stitle">選擇星期</div>
      <div class="g4" id="insert-day-grid"></div>
    </div>
    <div class="hidden" id="insert-class-wrap" style="margin-top:10px">
      <div class="stitle" id="insert-class-title">選擇班級</div>
      <div class="p2list" id="insert-class-list"></div>
    </div>
    <div id="insert-class-info" class="hidden" style="margin-top:10px">
      <div class="info-box" id="insert-info-box"></div>
      <div class="stitle">選擇第一堂上課日期</div>
      <div class="date-grid" id="date-grid"></div>
    </div>
  </div>

  <!-- 體驗課程 -->
  <div class="card hidden" id="c-trial-card">
    <span class="card-label">體驗課程資訊</span>
    <div class="stitle">選擇類別</div>
    <div class="g2" id="trial-cat-grid">
      <button class="gbtn" onclick="p2SelCat('trial','taipei',this)">🏙️ 台北跑步班</button>
      <button class="gbtn" onclick="p2SelCat('trial','kaohsiung',this)">🌆 高雄跑步班</button>
      <button class="gbtn" onclick="p2SelCat('trial','nurture',this)">🏃 跑者養成班</button>
      <button class="gbtn" onclick="p2SelCat('trial','strength',this)">💪 肌力班</button>
    </div>
    <div class="hidden" id="trial-day-wrap" style="margin-top:10px">
      <div class="stitle">選擇星期</div>
      <div class="g4" id="trial-day-grid"></div>
    </div>
    <div class="hidden" id="trial-class-wrap" style="margin-top:10px">
      <div class="stitle" id="trial-class-title">選擇班級</div>
      <div class="p2list" id="trial-class-list"></div>
    </div>
    <div id="trial-class-info" class="hidden" style="margin-top:10px">
      <div class="info-box" id="trial-info-box"></div>
      <div class="stitle">選擇上課日期</div>
      <div class="date-grid" id="trial-date-grid"></div>
    </div>
  </div>

  <!-- 結果 -->
  <div class="card hidden" id="c-result-card">
    <span class="card-label">回覆內容</span>
    <div class="result-box" id="c-result-box"></div>
    <button class="copy-btn" id="c-copy-btn" onclick="doCopy('c-result-box','c-copy-btn')">複製回覆內容</button>
  </div>
</div>
</div>

const DAYS=["週一","週二","週三","週四","週五","週六","週日"];
let cat=null,day=null,cls=null,type=null,lessons=1;
let ctype=null,fullCls=null,insertCls=null,selectedDate=null;

// Tab
function switchTab(id,btn){
  document.querySelectorAll("#app .page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll("#app .tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
}

// ── PAGE 1 ──
function selectCat(c,btn){
  cat=c;day=null;cls=null;type=null;
  document.querySelectorAll("#app .gbtn[onclick^='selectCat']").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll("#app #day-grid .gbtn").forEach(b=>b.classList.remove("active"));
  resetType();resetResult();
  document.getElementById("class-list").innerHTML='<p class="empty">請選擇星期</p>';
  document.getElementById("class-label").textContent="選擇班級";
  renderDays();
}

function renderDays(){
  const g=document.getElementById("day-grid");g.innerHTML="";
  const fi=cat?CF[cat]:()=>true;
  DAYS.forEach(d=>{
    const has=Object.keys(CL).some(n=>n.startsWith(d)&&!n.includes("未開班")&&fi(n));
    if(!has)return;
    const b=document.createElement("button");b.className="gbtn";b.textContent=d;
    b.onclick=()=>selDay(d,b);g.appendChild(b);
  });
}
renderDays();

function selDay(d,btn){
  day=d;cls=null;type=null;
  document.querySelectorAll("#app #day-grid .gbtn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  const fi=cat?CF[cat]:()=>true;
  renderCls(Object.keys(CL).filter(n=>n.startsWith(d)&&!n.includes("未開班")&&fi(n)));
  resetType();resetResult();
}

function renderCls(names){
  const list=document.getElementById("class-list");
  document.getElementById("class-label").textContent=`選擇班級（${names.length} 個）`;
  if(!names.length){list.innerHTML='<p class="empty">沒有符合班級</p>';return;}
  list.innerHTML=names.map(n=>{
    const c=CL[n];
    return`<button class="cbtn" onclick="selCls('${n}',this)">
      <span>${n.replace(/^週./,"")}</span>
      <span class="fh">$${c.f.toLocaleString()}</span>
    </button>`;
  }).join("");
}

function selCls(n,btn){
  cls=n;type=null;
  document.querySelectorAll("#app .cbtn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  resetType();resetResult();
}

function selectType(t){
  type=t;
  document.getElementById("btn-full").classList.toggle("active",t==="full");
  document.getElementById("btn-insert").classList.toggle("active",t==="insert");
  const lc=document.getElementById("lessons-card");
  if(t==="insert"){
    lc.classList.remove("hidden");
    lessons=1;
    document.getElementById("lnum").textContent="1";
    document.getElementById("fee-box").classList.add("hidden");
    resetResult();
  }else{
    lc.classList.add("hidden");
    if(cls)buildResult();
  }
}

function step(d){
  const max=cls?CL[cls].total:15;
  lessons=Math.min(max,Math.max(1,lessons+d));
  document.getElementById("lnum").textContent=lessons;
  if(!cls)return;
  const fee=CL[cls].p*lessons;
  document.getElementById("fee-amt").textContent=`$${fee.toLocaleString()}`;
  document.getElementById("fee-box").classList.remove("hidden");
  buildResult();
}

function buildResult(){
  if(!cls||!type)return;
  const c=CL[cls];let t="";
  if(type==="full"){
    t=`${cls} 的報名費用為 ${c.f.toLocaleString()} 元。\n如果費用沒有問題，幫我們『填寫報名表單＋匯款』。\n🔺匯款完成跟我們確認一下後五碼 確認完後即報名完成，我們就會通知您上課細節唷～\n報名表連結 👉🏻 ${flink(cls)}`;
  }else{
    const fee=c.p*lessons;
    t=`插班部分我們會扣除前面的課程費用 目前課程剩下${lessons}堂課，費用是${fee.toLocaleString()}元 如果費用沒有問題，幫我們『填寫報名表單＋匯款』。\n🔺匯款金額依小編提供的，不用依照表單最後的金額匯款喔！(已幫您扣除前面費用)\n🔺匯款完成跟我們確認一下後五碼 確認完後即報名完成，我們就會通知您上課細節唷～\n報名表連結 👉🏻 ${flink(cls)}`;
  }
  document.getElementById("result-box").textContent=t;
  resetBtn("copy-btn");
}

function resetType(){
  document.getElementById("btn-full").classList.remove("active");
  document.getElementById("btn-insert").classList.remove("active");
  document.getElementById("lessons-card").classList.add("hidden");
  type=null;
}
function resetResult(){
  document.getElementById("result-box").innerHTML='<span style="color:#444">選完班級與類型後自動產生</span>';
  resetBtn("copy-btn");
}
function resetBtn(id){const b=document.getElementById(id);b.classList.remove("copied");b.textContent="複製回覆內容";}

let p2FullCat=null, p2InsertCat=null, p2TrialCat=null;
let trialCls=null, trialDate=null;

function p2SelCat(mode, cat, btn) {
  const prefix = mode==="full" ? "full" : mode==="insert" ? "insert" : "trial";
  if(mode==="full"){p2FullCat=cat;fullCls=null;}
  else if(mode==="insert"){p2InsertCat=cat;insertCls=null;selectedDate=null;}
  else{p2TrialCat=cat;trialCls=null;trialDate=null;}

  // highlight cat btn
  document.querySelectorAll(`#${prefix}-cat-grid .gbtn`).forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  // reset downstream
  document.getElementById(`${prefix}-day-wrap`).classList.remove("hidden");
  document.getElementById(`${prefix}-class-wrap`).classList.add("hidden");
  document.getElementById(`${prefix}-class-info`).classList.add("hidden");
  document.getElementById("c-result-card").classList.add("hidden");

  // render day buttons
  const grid = document.getElementById(`${prefix}-day-grid`);
  grid.innerHTML="";
  const fi = CF[cat];
  DAYS.forEach(d=>{
    const has=Object.keys(CL).some(n=>n.startsWith(d)&&!n.includes("未開班")&&fi(n));
    if(!has)return;
    const b=document.createElement("button");
    b.className="gbtn";b.textContent=d;
    b.onclick=()=>p2SelDay(mode,d,b);
    grid.appendChild(b);
  });
}

function p2SelDay(mode, day, btn) {
  const prefix = mode==="full" ? "full" : mode==="insert" ? "insert" : "trial";
  const cat = mode==="full" ? p2FullCat : mode==="insert" ? p2InsertCat : p2TrialCat;
  if(mode==="full") fullCls=null;
  else if(mode==="insert"){insertCls=null;selectedDate=null;}
  else{trialCls=null;trialDate=null;}

  document.querySelectorAll(`#${prefix}-day-grid .gbtn`).forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  const fi=CF[cat];
  const names=Object.keys(CL).filter(n=>n.startsWith(day)&&!n.includes("未開班")&&fi(n));
  const wrap=document.getElementById(`${prefix}-class-wrap`);
  const titleEl=document.getElementById(`${prefix}-class-title`);
  const listEl=document.getElementById(`${prefix}-class-list`);

  titleEl.textContent=`選擇班級（${names.length} 個）`;
  listEl.innerHTML=names.map(n=>{
    const fn = mode==="full" ? `selFullCls` : mode==="insert" ? `selInsertCls` : `selTrialCls`;
    return`<button class="p2btn" onclick="${fn}('${n}',this)">${n.replace(/^週./,"").replace("(NEW)","")}</button>`;
  }).join("");
  wrap.classList.remove("hidden");
  document.getElementById(`${prefix}-class-info`).classList.add("hidden");
  document.getElementById("c-result-card").classList.add("hidden");
}

function doCopy(bid,btnid){
  const t=document.getElementById(bid).textContent;
  if(!t)return;
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.getElementById(btnid);
    b.textContent="✅ 已複製！";b.classList.add("copied");
    setTimeout(()=>{b.textContent="複製回覆內容";b.classList.remove("copied");},2500);
  });
}
